apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-deployment
  namespace: projet-final
  labels:
    app: frontend
    tier: frontend

spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
      tier: frontend

  template:
    metadata:
      labels:
        app: frontend
        tier: frontend

    spec:
      containers:
        - name: frontend

          image: mbayeuser/frontend-k8s:1.0

          ports:
            - containerPort: 80

          env:
            - name: BACKEND_URL
              valueFrom:
                configMapKeyRef:
                  name: frontend-config
                  key: BACKEND_URL

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"

            limits:
              cpu: "500m"
              memory: "256Mi"

          readinessProbe:
            httpGet:
              path: /
              port: 80

          livenessProbe:
            httpGet:
              path: /
              port: 80